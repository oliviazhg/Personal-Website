<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects - Olivia's Portfolio</title>
  <link rel="stylesheet" href="css/loading.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400;500;600;700&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #d5dad4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }
    .message {
      text-align: center;
      color: #1105dc;
    }
    .message h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }
    .message p {
      font-size: 0.9rem;
      font-weight: 300;
      opacity: 0.7;
    }
    .message a {
      color: #1105dc;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-size: 0.9rem;
      font-weight: 300;
    }
    .message a:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body class="no-scroll">
  <!-- Loading Screen -->
  <div class="loading-screen">
    <div class="loading-content">
      <img src="assets/star.svg" alt="Loading" class="loading-star">
      <div class="loading-text"></div>
    </div>
  </div>

  <div class="message">
    <h1>projects to be added soon</h1>
    <p><a href="index.html">back to home</a></p>
  </div>

  <script src="js/loading.js"></script>
</body>
</html>
